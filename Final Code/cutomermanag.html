<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Customer Management</title>

<style>
    body {
    margin: 0;
    background: #f6f8fb;
    font-family: "Inter", sans-serif;
}

.admin-wrapper {
    padding: 30px 20px;
}

.page-header {
    max-width: 1200px;
    margin: auto;
    margin-bottom: 20px;
}

.page-header h1 {
    margin: 0;
    font-size: 26px;
    font-weight: 600;
}
.navbar {
    display: flex;
    justify-content: center;
    align-items: center;
    background: white;
    padding: 12px 0;
    box-shadow: 0 1px 8px rgba(0,0,0,0.05);
    position: sticky;
    top: 0;
    z-index: 50;
}

.nav-buttons {
    display: flex;
    gap: 20px;
}

.nav-buttons a.nav-button {
    display: inline-flex;
    align-items: center;
    padding: 8px 20px;
    border-radius: 7px;      
    background: #e7e9eb;   
    color: black;
    font-size: 14px;
    text-decoration: none;
    transition: all 0.25s ease;
}

.nav-buttons a.nav-button.active {
    background: #e7e9eb;
    color: black;
}

.nav-buttons a.nav-button:hover {
    background: linear-gradient(to right, #30CDF5, #00FAA0);
    color: black;
    transform: translateY(-2px) scale(1.05);
}

.customer-container {
    width: 95%;
    max-width: 1200px;
    margin: 40px auto;
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.06);
    font-family: "Inter", sans-serif;
}

/* ===== Table ===== */
table {
    width: 100%;
    border-collapse: collapse;
    font-size: 16px;
    margin-top: 20px;
}

th, td {
    padding: 12px;
    border-bottom: 1px solid #e5e7eb;
    text-align: center;
}

th {
    background: #1f2937;
    color: white;
    font-weight: 600;
}

/* ===== Buttons ===== */
button {
    padding: 8px 14px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-family: "Inter", sans-serif;
    font-weight: 500;
    transition: all 0.25s ease;
}

button:hover {
    transform: scale(1.05);
}

.add-btn {
    background: linear-gradient(to right, #30CDF5, #00FAA0);
    color: black;
    margin-bottom: 15px;
}

.edit-btn { background: #30CDF5; color: white; }
.delete-btn { background: #ff0000; color: white; }

/* ===== Modal ===== */
.modal {
    display: none;
    position: fixed;
    background: rgba(0,0,0,0.5);
    width: 100%;
    height: 100%;
    top: 0;
    z-index: 100;
}

.modal-content {
    background: white;
    width: 500px;
    max-width: 90%;
    margin: 10% auto;
    padding: 25px;
    border-radius: 12px;
    position: relative;
}

.close {
    position: absolute;
    right: 15px;
    top: 10px;
    font-size: 22px;
    cursor: pointer;
}

.modal input {
    width: 100%;
    padding: 10px 12px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 14px;
}

.modal .buttons {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-top: 15px;
}

@media (max-width: 768px) {
    .nav-buttons {
        flex-wrap: wrap;
        gap: 10px;
    }
}
</style>
</head>
<body>

<header class="navbar">
    <div class="nav-buttons">
        <a href="admin.html" class="nav-button active">Dashboard</a>
        <a href="inventory.html" class="nav-button">Inventory</a>
        <a href="cutomermanag.html" class="nav-button">Customers</a>
        <a href="report.html" class="nav-button">Reports</a>
    </div>
</header>

<div class="customer-container">
    <h2>Customer Management</h2>
    <button class="add-btn" id="addCustomerBtn">Add New Customer</button>
    
    <table id="customerTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<!-- Modal for Add/Edit -->
<div id="customerModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h2 id="modalTitle">Add Customer</h2>
        <input type="text" id="customerName" placeholder="Full Name">
        <input type="email" id="customerEmail" placeholder="Email">
        <input type="text" id="customerPhone" placeholder="Phone">
        <div class="buttons">
            <button id="saveCustomerBtn" class="add-btn">Save</button>
            <button class="delete-btn" id="cancelBtn">Cancel</button>
        </div>
    </div>
</div>

<script>
    let customers = [
    { id: 1, name: "John Smith", email: "john@example.com", phone: "123-456-7890" },
    { id: 2, name: "Sarah Khan", email: "sarah@example.com", phone: "987-654-3210" }
];

const tableBody = document.querySelector("#customerTable tbody");
const modal = document.getElementById("customerModal");
const closeBtn = document.querySelector(".close");
const addBtn = document.getElementById("addCustomerBtn");
const saveBtn = document.getElementById("saveCustomerBtn");
const cancelBtn = document.getElementById("cancelBtn");
const modalTitle = document.getElementById("modalTitle");

let editCustomerId = null;

// Render table
function loadCustomers() {
    tableBody.innerHTML = "";
    customers.forEach(customer => {
        const row = document.createElement("tr");
        row.innerHTML = `
            <td>${customer.id}</td>
            <td>${customer.name}</td>
            <td>${customer.email}</td>
            <td>${customer.phone}</td>
            <td>
                <button class="edit-btn" onclick="editCustomer(${customer.id})">Edit</button>
                <button class="delete-btn" onclick="deleteCustomer(${customer.id})">Delete</button>
            </td>
        `;
        tableBody.appendChild(row);
    });
}

// Open modal for Add
addBtn.onclick = () => {
    editCustomerId = null;
    modalTitle.textContent = "Add Customer";
    document.getElementById("customerName").value = "";
    document.getElementById("customerEmail").value = "";
    document.getElementById("customerPhone").value = "";
    modal.style.display = "block";
}

// Open modal for Edit
function editCustomer(id) {
    editCustomerId = id;
    modalTitle.textContent = "Edit Customer";
    const customer = customers.find(c => c.id === id);
    document.getElementById("customerName").value = customer.name;
    document.getElementById("customerEmail").value = customer.email;
    document.getElementById("customerPhone").value = customer.phone;
    modal.style.display = "block";
}

// Save customer
saveBtn.onclick = () => {
    const name = document.getElementById("customerName").value.trim();
    const email = document.getElementById("customerEmail").value.trim();
    const phone = document.getElementById("customerPhone").value.trim();
    if (!name || !email || !phone) {
        alert("All fields are required!");
        return;
    }

    if (editCustomerId) {
        // Edit
        const customer = customers.find(c => c.id === editCustomerId);
        customer.name = name;
        customer.email = email;
        customer.phone = phone;
    } else {
        // Add
        const newId = customers.length ? customers[customers.length-1].id + 1 : 1;
        customers.push({ id: newId, name, email, phone });
    }

    modal.style.display = "none";
    loadCustomers();
}

// Delete customer
function deleteCustomer(id) {
    if (confirm("Are you sure you want to delete this customer?")) {
        customers = customers.filter(c => c.id !== id);
        loadCustomers();
    }
}

// Close modal
closeBtn.onclick = cancelBtn.onclick = () => modal.style.display = "none";
window.onclick = e => { if (e.target === modal) modal.style.display = "none"; }

// Initial load
loadCustomers();
</script>
</body>
</html>
