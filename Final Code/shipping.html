<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EveryWear - Checkout</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon@4.7.0/fonts/remixicon.css" rel="stylesheet"/>
<link rel="stylesheet" href="style.css">

<style>

/* RESET */
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: "Inter", Arial, sans-serif;
    background: #f7f8fa;
    color: #333;
}

/* LAYOUT */
.checkout-wrapper {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 25px;
    max-width: 1100px;
    margin: 40px auto;
}

.checkout-left {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.checkout-right {
    position: sticky;
    top: 100px;
}

/* BOX */
.box {
    background: white;
    padding: 20px;
    border-radius: 10px;
    border: 1px solid #e3e3e3;
}

.box h2 { margin-bottom: 15px; }

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

.two-cols {
    display: flex;
    gap: 10px;
}

/* DELIVERY */
.delivery-card {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 15px;
    margin-top: 12px;
    cursor: pointer;
}

.delivery-card input { display: none; }

.delivery-card:has(input:checked) {
    border: 2px solid black;
    background: #f9f9f9;
}

/* ORDER ITEMS */
.summary-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 15px;
}

.item-left {
    display: flex;
    gap: 12px;
    align-items: center;
}

.item-img {
    width: 55px;
    height: 55px;
    object-fit: cover;
    border-radius: 8px;
}

.item-name {
    font-weight: 600;
    font-size: 14px;
}

.item-meta {
    font-size: 12px;
    color: #777;
}

.item-price {
    font-weight: 600;
}

/* TOTALS */
.totals p, .totals h3 {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
}

/* BUTTON */
.btn {
    width: 100%;
    padding: 16px;
    margin-top: 20px;
    background: black;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

/* MAP */
.map {
    width: 100%;
    height: 250px;
    border-radius: 10px;
    border: none;
}

/* RESPONSIVE */
@media (max-width: 900px) {
    .checkout-wrapper {
        grid-template-columns: 1fr;
    }

    .checkout-right {
        position: static;
    }
}

</style>
</head>

<body>

<div class="navbar">

        <div class="logo-section">
            <a href="EveryWear Homepage.html" class="logo-link" aria-label="Go to homepage">
                <img src="images/logo.png" loading="eager" alt="EveryWear Logo" width="120" height="90" class="site-logo">
            </a>
        </div>

        <div class="nav-buttons">
            <a href="About Us.html" class="nav-button">About Us</a>
            <a href="productline.html" class="nav-button">Products</a>
            <a href="reviews.html" class="nav-button">Reviews</a>
            <a href="Contact Us.html" class="nav-button">Contact Us</a>
        </div>

        <div class="right-controls">
            <a href="Login.html" class="login-btn">Log in</a>
            <a href="create-account.html" class="create-btn">
                <img src="images/account.png" alt="" class="btn-icon">
                Create Account
            </a>

            <a href="productdescrip.html#open-cart.html" class="icon-link">
                <img src="images/basket.png" alt="Basket" class="nav-icon">
            </a>

            <div class="icon-link">
                <img src="images/search.png" alt="Search" class="nav-icon">
            </div>
        </div>
    </div>

<!-- CHECKOUT -->
<div class="checkout-wrapper">

    <!-- LEFT -->
    <div class="checkout-left">

        <div class="box">
            <h2>Shipping Information</h2>
            <input type="text" placeholder="Full Name">
            <input type="text" placeholder="Address">
            <input type="text" placeholder="City">

            <div class="two-cols">
                <input type="text" placeholder="Postcode">
                <input type="text" placeholder="Country">
            </div>
        </div>

        <div class="box">
            <h2>Delivery Method</h2>

            <label class="delivery-card">
                <input type="radio" name="delivery" value="3.99" checked>
                <div>
                    <strong>Standard Delivery</strong>
                    <p>3–5 days</p>
                </div>
                <span>£3.99</span>
            </label>

            <label class="delivery-card">
                <input type="radio" name="delivery" value="7.99">
                <div>
                    <strong>Express Delivery</strong>
                    <p>1–2 days</p>
                </div>
                <span>£7.99</span>
            </label>
        </div>

        <div class="box">
            <h2>Your Location</h2>
            <iframe src="https://maps.google.com/maps?q=Birmingham%20UK&output=embed" class="map"></iframe>
        </div>

    </div>

    <!-- RIGHT -->
    <div class="checkout-right">
        <div class="box">

            <h2>Order Summary</h2>

            <!-- DYNAMIC ITEMS -->
            <div id="order-items"></div>

            <hr>

            <div class="totals">
                <p><span>Subtotal</span><span id="subtotal">£0.00</span></p>
                <p><span>Shipping</span><span id="shipping">£3.99</span></p>
                <h3><span>Total</span><span id="total">£0.00</span></h3>
            </div>

            <button class="btn">Continue to Payment</button>

        </div>
    </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

    const cart = JSON.parse(localStorage.getItem("cart")) || [];
    const container = document.getElementById("order-items");

    let subtotal = 0;

    cart.forEach(item => {
        const quantity = Number(item.qty ?? item.quantity) || 1;
        const price = Number(item.price) || 0;
        const itemTotal = price * quantity;

        subtotal += itemTotal;

        // Display in order items
        const orderDiv = document.createElement("div");
        orderDiv.classList.add("summary-item");
        orderDiv.innerHTML = `
            <div class="item-left">
                <img src="${item.image || ''}" class="item-img">
                <div>
                    <p class="item-name">${item.name || 'Unnamed Item'}</p>
                    <p class="item-meta">Size: ${item.size || 'N/A'} • Qty: ${quantity}</p>
                </div>
            </div>
            <span class="item-price">£${itemTotal.toFixed(2)}</span>
        `;
        container.appendChild(orderDiv);
    });

    /* TOTALS */
    let shipping = 3.99;

    const subtotalText = document.getElementById("subtotal");
    const shippingText = document.getElementById("shipping");
    const totalText = document.getElementById("total");

    subtotalText.textContent = `£${subtotal.toFixed(2)}`;
    shippingText.textContent = `£${shipping.toFixed(2)}`;
    totalText.textContent = `£${(subtotal + shipping).toFixed(2)}`;

    /* DELIVERY CHANGE */
    document.querySelectorAll('input[name="delivery"]').forEach(option => {
        option.addEventListener("change", () => {
            shipping = parseFloat(option.value) || 0;
            shippingText.textContent = `£${shipping.toFixed(2)}`;
            totalText.textContent = `£${(subtotal + shipping).toFixed(2)}`;
        });
    });

});
</script>

</body>
</html>
