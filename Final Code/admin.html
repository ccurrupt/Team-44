<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard & Orders</title>

<style>
    body{
        margin:0;
        font-family:"Inter",sans-serif;
        background:#f6f8fb;
    }

    /* NAVBAR */
    .navbar {
        display: flex;
        justify-content: center;
        align-items: center;
        background: white;
        padding: 12px 0;
        box-shadow: 0 1px 8px rgba(0,0,0,0.05);
        position: sticky;
        top: 0;
        z-index: 50;
    }
    .nav-buttons {
        display: flex;
        gap: 20px;
    }
    .nav-buttons a.nav-button {
        display: inline-flex;
        align-items: center;
        padding: 8px 20px;
        border-radius: 7px;
        background: #e7e9eb;
        color: black;
        font-size: 14px;
        text-decoration: none;
        transition: all 0.25s ease;
    }
    .nav-buttons a.nav-button.active {
        background: #e7e9eb;
        color: black;
    }
    .nav-buttons a.nav-button:hover {
        background: linear-gradient(to right, #30CDF5, #00FAA0);
        color: black;
        transform: translateY(-2px) scale(1.05);
    }

    /* WRAPPERS */
    .wrapper{
        max-width:1200px;
        margin:40px auto;
        padding:0 20px;
    }
    h1,h2{
        margin-bottom:25px;
    }

    /* STATS CARDS */
    .stats{
        display:grid;
        grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
        gap:20px;
        margin-bottom: 40px;
    }
    .card{
        background:white;
        padding:25px;
        border-radius:12px;
        box-shadow:0 5px 15px rgba(0,0,0,0.06);
    }
    .card h3{
        margin:0;
        color:#6b7280;
        font-size:14px;
    }
    .card .value{
        font-size:28px;
        font-weight:600;
        margin-top:10px;
    }
    .highlight{
        background:linear-gradient(to right,#30CDF5,#00FAA0);
        color:black;
    }

    /* ORDERS TABLE */
    .orders-container {
        width: 100%;
        background: white;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.06);
        margin-bottom: 40px;
    }
    table{
        width:100%;
        border-collapse:collapse;
    }
    th,td{
        padding:12px;
        border-bottom:1px solid #e5e7eb;
        text-align:center;
    }
    th{
        background:#1f2937;
        color:white;
        position: sticky;
        top: 0;
    }
    tbody tr:hover{
        background: #f9fafb;
    }

    .status{
        padding:6px 12px;
        border-radius:20px;
        font-size:13px;
        display:inline-block;
    }
    .pending{background:#fee2e2;color:#f80000;}
    .processing{background:#fef3c7;color:#f59e0b;}
    .shipped{background:#d1fae5;color:#10b981;}
    .completed{background:#e0e7ff;color:#6366f1;}

    /* BUTTONS */
    button {
        padding: 8px 16px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-family: "Inter", sans-serif;
        font-weight: 500;
        transition: all 0.25s ease;
    }
    button:hover { transform: scale(1.05); }
    .view-btn { 
        background: linear-gradient(to right, #30CDF5, #00FAA0); 
        color: black; 
    }

    /* MODAL */
    .modal {
        display: none;
        position: fixed;
        background: rgba(0,0,0,0.5);
        width: 100%;
        height: 100%;
        top: 0;
        z-index: 100;
    }
    .modal-content {
        background: white;
        width: 500px;
        max-width: 90%;
        margin: 10% auto;
        padding: 25px;
        border-radius: 12px;
        position: relative;
    }
    .close {
        position: absolute;
        right: 15px;
        top: 10px;
        font-size: 22px;
        cursor: pointer;
    }
    .modal .buttons {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-top: 20px;
    }
    #processBtn { background: linear-gradient(to right, #30CDF5, #00FAA0); color: black; }
    #shipBtn { background: #4b74ff; color: white; }
    #completeBtn { background: #6366f1; color: white; }
    #processBtn:hover, #shipBtn:hover, #completeBtn:hover { opacity: 0.85; }

    .empty{
        text-align:center;
        color:#6b7280;
        padding:20px;
    }

    @media (max-width: 768px) {
    .nav-buttons {
        flex-wrap: wrap;
        gap: 10px;
    }
}
</style>
</head>

<body>

<header class="navbar">
    <div class="nav-buttons">
        <a href="admin.html" class="nav-button active">Dashboard</a>
        <a href="inventory.html" class="nav-button">Inventory</a>
        <a href="cutomermanag.html" class="nav-button">Customers</a>
        <a href="report.html" class="nav-button">Reports</a>
    </div>
</header>

<div class="wrapper">

<h1>Dashboard Overview</h1>

<!-- STATS -->
<div class="stats">
    <div class="card highlight">
        <h3>Total Orders</h3>
        <div class="value" id="totalOrders">0</div>
    </div>
    <div class="card">
        <h3>Total Revenue (£)</h3>
        <div class="value" id="totalRevenue">0</div>
    </div>
    <div class="card">
        <h3>Pending Orders</h3>
        <div class="value" id="pendingOrders">0</div>
    </div>
</div>

<!-- ORDERS MANAGEMENT -->
<div class="orders-container">
    <h2>Order Management</h2>
    <table id="ordersTable">
        <thead>
            <tr>
                <th>Order ID</th>
                <th>Customer</th>
                <th>Total (£)</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    <p id="emptyMessage" class="empty" style="display:none;">No orders yet.</p>
</div>

</div>

<!-- Modal -->
<div id="orderModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h2>Order Details</h2>
        <div id="orderInfo"></div>
        <div class="buttons">
            <button id="processBtn">Process Order</button>
            <button id="shipBtn">Mark as Shipped</button>
            <button id="completeBtn">Complete Order</button>
        </div>
    </div>
</div>

<script>
let orders = JSON.parse(localStorage.getItem("orders")) || [];

/* ===== STATS ===== */
function updateStats() {
    document.getElementById("totalOrders").textContent = orders.length;
    const revenue = orders.reduce((sum,o)=>sum + Number(o.total || 0),0);
    document.getElementById("totalRevenue").textContent = revenue.toFixed(2);
    const pending = orders.filter(o=>o.status==="Pending").length;
    document.getElementById("pendingOrders").textContent = pending;
}

/* ===== ORDERS TABLE ===== */
const tableBody = document.querySelector("#ordersTable tbody");
const modal = document.getElementById("orderModal");
const closeBtn = document.querySelector(".close");
const orderInfo = document.getElementById("orderInfo");
let selectedOrder = null;

function loadOrders() {
    tableBody.innerHTML = "";
    if (orders.length === 0) {
        document.getElementById("emptyMessage").style.display = "block";
        return;
    }
    document.getElementById("emptyMessage").style.display = "none";
    orders.forEach(order => {
        const row = document.createElement("tr");
        row.innerHTML = `
            <td>${order.id}</td>
            <td>${order.customer}</td>
            <td>${order.total}</td>
            <td>
                <span class="status ${order.status.toLowerCase()}">${order.status}</span>
            </td>
            <td><button class="view-btn" onclick="viewOrder(${order.id})">View</button></td>
        `;
        tableBody.appendChild(row);
    });
}

/* ===== MODAL FUNCTIONS ===== */
function viewOrder(id) {
    selectedOrder = orders.find(o => o.id === id);
    orderInfo.innerHTML = `
        <p><strong>Customer:</strong> ${selectedOrder.customer}</p>
        <p><strong>Transaction:</strong> ${selectedOrder.transaction || "-"}</p>
        <p><strong>Items:</strong> ${selectedOrder.items ? selectedOrder.items.join(", ") : "-"}</p>
        <p><strong>Status:</strong> ${selectedOrder.status}</p>
    `;
    modal.style.display = "block";
}

function updateStatus(newStatus) {
    if (!selectedOrder) return;
    selectedOrder.status = newStatus;
    localStorage.setItem("orders", JSON.stringify(orders));
    modal.style.display = "none";
    loadOrders();
    updateStats();
}

/* BUTTON LISTENERS */
document.getElementById("processBtn").addEventListener("click", () => updateStatus("Processing"));
document.getElementById("shipBtn").addEventListener("click", () => updateStatus("Shipped"));
document.getElementById("completeBtn").addEventListener("click", () => updateStatus("Completed"));
closeBtn.onclick = () => modal.style.display = "none";
window.onclick = e => { if (e.target === modal) modal.style.display = "none"; };

/* INITIAL LOAD */
loadOrders();
updateStats();
</script>

</body>
</html>
