<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Inventory Management</title>

<style>
    body {
    margin: 0;
    background: #f6f8fb;
    font-family: "Inter", sans-serif;
    }

    .admin-wrapper {
        padding: 30px 20px;
    }

    .page-header {
        max-width: 1200px;
        margin: auto;
        margin-bottom: 20px;
    }

    .page-header h1 {
        margin: 0;
        font-size: 26px;
        font-weight: 600;
    }

    .navbar {
        display: flex;
        justify-content: center;
        align-items: center;
        background: white;
        padding: 12px 0;
        box-shadow: 0 1px 8px rgba(0,0,0,0.05);
        position: sticky;
        top: 0;
        z-index: 50;
    }

    .nav-buttons {
        display: flex;
        gap: 20px;
    }

    .nav-buttons a.nav-button {
        display: inline-flex;
        align-items: center;
        padding: 8px 20px;
        border-radius: 7px;
        background: #e7e9eb;
        color: black;
        font-size: 14px;
        text-decoration: none;
        transition: all 0.25s ease;
    }

    .nav-buttons a.nav-button.active {
        background: #e7e9eb;
        color: black;
    }

    .nav-buttons a.nav-button:hover {
        background: linear-gradient(to right, #30CDF5, #00FAA0);
        color: black;
        transform: translateY(-2px) scale(1.05);
    }

    .inventory-container {
        width: 95%;
        max-width: 1200px;
        margin: 40px auto;
        background: white;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.06);
        font-family: "Inter", sans-serif;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        font-size: 16px;
        margin-top: 20px;
    }

    th, td {
        padding: 12px;
        border-bottom: 1px solid #e5e7eb;
        text-align: center;
    }

    th {
        background: #1f2937;
        color: white;
        font-weight: 600;
    }

    button {
        padding: 8px 14px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-family: "Inter", sans-serif;
        font-weight: 500;
        transition: all 0.25s ease;
    }

    button:hover {
        transform: scale(1.05);
    }

    .add-btn {
        background: linear-gradient(to right, #30CDF5, #00FAA0);
        color: black;
        margin-bottom: 15px;
    }

    .edit-btn { background: #30CDF5; color: white; }
    .delete-btn { background: #ff0000; color: white; }
    .in-stock { color: #10b981; font-weight: 600; }
    .low-stock { color: #f59e0b; font-weight: 600; }
    .out-of-stock { color: #ff0000; font-weight: 600; }

    .modal {
        display: none;
        position: fixed;
        background: rgba(0,0,0,0.5);
        width: 100%;
        height: 100%;
        top: 0;
        z-index: 100;
    }

    .modal-content {
        background: white;
        width: 500px;
        max-width: 90%;
        margin: 10% auto;
        padding: 25px;
        border-radius: 12px;
        position: relative;
    }

    .close {
        position: absolute;
        right: 15px;
        top: 10px;
        font-size: 22px;
        cursor: pointer;
    }

    .modal input, .modal select {
        width: 100%;
        padding: 10px 12px;
        margin: 8px 0;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 14px;
    }

    .modal .buttons {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-top: 15px;
    }

    .product-img {
        width: 60px;
        height: 60px;
        object-fit: cover;
        border-radius: 6px;
    }

    @media (max-width: 768px) {
    .nav-buttons {
        flex-wrap: wrap;
        gap: 10px;
    }
}
</style>
</head>
<body>

<header class="navbar">
    <div class="nav-buttons">
        <a href="admin.html" class="nav-button active">Dashboard</a>
        <a href="inventory.html" class="nav-button">Inventory</a>
        <a href="cutomermanag.html" class="nav-button">Customers</a>
        <a href="report.html" class="nav-button">Reports</a>
    </div>
</header>

<div class="inventory-container">
    <h2>Inventory Management</h2>
    <button class="add-btn" id="addProductBtn">Add New Product</button>

    <table id="inventoryTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Product</th>
                <th>Image</th>
                <th>Price (£)</th>
                <th>Stock</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<!-- Modal for Add/Edit Product -->
<div id="productModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h2 id="modalTitle">Add Product</h2>
        <input type="text" id="productName" placeholder="Product Name">
        <input type="number" id="productPrice" placeholder="Price (£)">
        <input type="text" id="productImage" placeholder="Image URL">
        <input type="number" id="productStock" placeholder="Stock Quantity">
        <div class="buttons">
            <button id="saveProductBtn" class="add-btn">Save</button>
            <button class="delete-btn" id="cancelBtn">Cancel</button>
        </div>
    </div>
</div>

<script>
    let products = [
    { id: 1, name: "Sandals", image: "sandals1.png", price: 25, stock: 20 },
    { id: 2, name: "Jumper", image: "jumper1.png", price: 29, stock: 5 },
    { id: 3, name: "Crocs", image: "crocs1.png", price: 39, stock: 0 }
];

const tableBody = document.querySelector("#inventoryTable tbody");
const modal = document.getElementById("productModal");
const closeBtn = document.querySelector(".close");
const addBtn = document.getElementById("addProductBtn");
const saveBtn = document.getElementById("saveProductBtn");
const cancelBtn = document.getElementById("cancelBtn");
const modalTitle = document.getElementById("modalTitle");

let editProductId = null;

// Render table
function loadProducts() {
    tableBody.innerHTML = "";
    products.forEach(product => {
        let stockClass = "in-stock";
        if (product.stock === 0) stockClass = "out-of-stock";
        else if (product.stock <= 5) stockClass = "low-stock";

        const row = document.createElement("tr");
        row.innerHTML = `
            <td>${product.id}</td>
            <td>${product.name}</td>
            <td><img class="product-img" src="${product.image}" alt="${product.name}"></td>
            <td>${product.price.toFixed(2)}</td>
            <td class="${stockClass}">${product.stock}</td>
            <td>
                <button class="edit-btn" onclick="editProduct(${product.id})">Edit</button>
                <button class="delete-btn" onclick="deleteProduct(${product.id})">Delete</button>
            </td>
        `;
        tableBody.appendChild(row);
    });
}

// Open modal for Add
addBtn.onclick = () => {
    editProductId = null;
    modalTitle.textContent = "Add Product";
    document.getElementById("productName").value = "";
    document.getElementById("productPrice").value = "";
    document.getElementById("productImage").value = "";
    document.getElementById("productStock").value = "";
    modal.style.display = "block";
}

// Open modal for Edit
function editProduct(id) {
    editProductId = id;
    modalTitle.textContent = "Edit Product";
    const product = products.find(p => p.id === id);
    document.getElementById("productName").value = product.name;
    document.getElementById("productPrice").value = product.price;
    document.getElementById("productImage").value = product.image;
    document.getElementById("productStock").value = product.stock;
    modal.style.display = "block";
}

// Save product
saveBtn.onclick = () => {
    const name = document.getElementById("productName").value.trim();
    const price = parseFloat(document.getElementById("productPrice").value);
    const image = document.getElementById("productImage").value.trim();
    const stock = parseInt(document.getElementById("productStock").value);

    if (!name || isNaN(price) || !image || isNaN(stock)) {
        alert("All fields are required!");
        return;
    }

    if (editProductId) {
        // Edit
        const product = products.find(p => p.id === editProductId);
        product.name = name;
        product.price = price;
        product.image = image;
        product.stock = stock;
    } else {
        // Add
        const newId = products.length ? products[products.length-1].id + 1 : 1;
        products.push({ id: newId, name, price, image, stock });
    }

    modal.style.display = "none";
    loadProducts();
}

// Delete product
function deleteProduct(id) {
    if (confirm("Are you sure you want to delete this product?")) {
        products = products.filter(p => p.id !== id);
        loadProducts();
    }
}

// Close modal
closeBtn.onclick = cancelBtn.onclick = () => modal.style.display = "none";
window.onclick = e => { if (e.target === modal) modal.style.display = "none"; }

// Initial load
loadProducts();
</script>
</body>
</html>
